<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#0a0b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Golf Gang · World Cup Pool</title>
<style>
  :root{
    --ink:#0a0b0f;
    --carbon:#12141b;
    --carbon2:#181b24;
    --line:#242835;
    --line2:#2f3546;
    --dim:#707a8f;
    --text:#e8ecf4;
    --nitro:#3df5c4;      /* nitrous green */
    --nitro-dim:#1a6b54;
    --nitro-glow:rgba(61,245,196,.16);
    --amber:#ff8c42;      /* speedometer amber */
    --red:#ff4d4d;
    --gold:#ffd15c;
    --purple:#a682ff;
    /* categorical series colors, fixed order — identity, never reassigned by rank */
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9; --s6:#e66767;
    --font:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    --mono:"SF Mono","Roboto Mono",ui-monospace,Menlo,monospace;
  }
  :root[data-theme="light"]{
    --ink:#f4f5f8;
    --carbon:#ffffff;
    --carbon2:#eef0f4;
    --line:#dde1e8;
    --line2:#c7cdd8;
    --dim:#5b6474;
    --text:#14161c;
    --nitro:#0d9b78;
    --nitro-dim:#bdf0e2;
    --nitro-glow:rgba(13,155,120,.10);
    --amber:#c2660a;
    --red:#d63838;
    --gold:#a97a00;
    --purple:#6f47d6;
    --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7; --s6:#e34948;
  }
  /* A handful of rules below use a hardcoded near-white text color for contrast against a colored
     tint on the dark background — those need a dark equivalent so they stay legible on light. */
  :root[data-theme="light"] .m .team.win{color:#0a5c46;}
  :root[data-theme="light"] .m .team.win.locked{color:#4a2d99;}
  :root[data-theme="light"] .m .team.hypo{color:#7a5400;}
  :root[data-theme="light"] .pbox.correct{color:#0a5c46;}
  :root[data-theme="light"] .pbox.wrong{color:#8a1f1f;}
  :root[data-theme="light"] .fc-note{color:#6b4a26;}
  :root[data-theme="light"] .row.p2 .rank{color:#7d8698;}
  :root[data-theme="light"] .row.p2::before{background:#7d8698;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--ink);color:var(--text);font-family:var(--font);min-height:100vh;transition:background .2s,color .2s;
    background:
      radial-gradient(1000px 500px at 85% -10%, rgba(61,245,196,.05), transparent 60%),
      radial-gradient(800px 400px at 0% 110%, rgba(255,140,66,.04), transparent 55%),
      var(--ink);}
  :root[data-theme="light"] body{
    background:
      radial-gradient(1000px 500px at 85% -10%, rgba(13,155,120,.05), transparent 60%),
      radial-gradient(800px 400px at 0% 110%, rgba(194,102,10,.04), transparent 55%),
      var(--ink);}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px 60px;}

  /* header */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    padding:10px 0 20px;border-bottom:1px solid var(--line);margin-bottom:8px;flex-wrap:wrap;}
  .brand{display:flex;flex-direction:column;gap:3px;}
  .brand .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--nitro);text-transform:uppercase;}
  .brand h1{margin:0;font-size:34px;font-weight:900;letter-spacing:-.03em;line-height:.95;
    background:linear-gradient(92deg,#fff 20%,var(--nitro) 120%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  :root[data-theme="light"] .brand h1{background:linear-gradient(92deg,#14161c 20%,var(--nitro) 120%);-webkit-background-clip:text;background-clip:text;}
  .brand .tag{color:var(--dim);font-size:12.5px;letter-spacing:.02em;}
  .tabs{display:flex;gap:4px;background:var(--carbon);border:1px solid var(--line);border-radius:11px;padding:4px;
    overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);
    padding:8px 14px;border-radius:8px;cursor:pointer;border:none;background:transparent;transition:.15s;font-weight:600;
    white-space:nowrap;flex:0 0 auto;}
  .themebtn{font-size:18px;background:var(--carbon);border:1px solid var(--line);border-radius:9px;
    width:38px;height:38px;cursor:pointer;color:var(--text);transition:.15s;}
  .themebtn:hover{border-color:var(--nitro);}
  .tab.on{background:var(--nitro);color:var(--ink);font-weight:800;}

  /* leaderboard */
  .board{margin-top:20px;display:flex;flex-direction:column;gap:9px;}
  .row{display:grid;grid-template-columns:34px 1fr auto;gap:14px;align-items:center;
    background:var(--carbon);border:1px solid var(--line);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;transition:.2s;}
  .row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;}
  .row.p1::before{background:var(--gold);}
  .row.p2::before{background:#c7cede;}
  .row.p3::before{background:var(--amber);}
  .rank{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--dim);text-align:center;}
  .row.p1 .rank{color:var(--gold);}.row.p2 .rank{color:#c7cede;}.row.p3 .rank{color:var(--amber);}
  .who{display:flex;flex-direction:column;gap:5px;min-width:0;}
  .who .nm{font-size:17px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;
    cursor:pointer;width:fit-content;}
  .who .nm:hover{color:var(--nitro);text-decoration:underline;}
  .who .champ{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em;}
  .who .champ .alive{color:var(--nitro);}
  .who .champ .out{color:var(--red);text-decoration:line-through;opacity:.8;}
  .score{text-align:right;display:flex;flex-direction:column;gap:3px;}
  .score .pts{font-family:var(--mono);font-size:24px;font-weight:800;letter-spacing:-.02em;}
  .score .ceil{font-family:var(--mono);font-size:11px;color:var(--dim);}
  .score .ceil b{color:var(--amber);font-weight:700;}

  /* potential bar */
  .barwrap{grid-column:1 / -1;margin-top:4px;height:5px;background:var(--carbon2);border-radius:99px;overflow:hidden;position:relative;}
  .bar-earned{position:absolute;left:0;top:0;bottom:0;background:var(--nitro);border-radius:99px;}
  .bar-poss{position:absolute;top:0;bottom:0;background:rgba(255,140,66,.35);border-radius:99px;}

  .legend{display:flex;gap:18px;margin:18px 2px 0;font-family:var(--mono);font-size:11px;color:var(--dim);flex-wrap:wrap;}
  .legend span{display:flex;align-items:center;gap:7px;}
  .dot{width:10px;height:10px;border-radius:3px;}
  .dot.e{background:var(--nitro);}.dot.p{background:rgba(255,140,66,.5);}

  /* admin */
  .admin{margin-top:20px;}
  .admin .intro{color:var(--dim);font-size:13px;line-height:1.5;margin-bottom:16px;max-width:64ch;}
  .rd{margin-bottom:22px;}
  .rd h3{font-size:13px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--nitro);
    margin:0 0 10px;display:flex;align-items:center;gap:10px;}
  .rd h3 .ct{color:var(--dim);font-weight:400;}
  .matchgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px;}
  .m{background:var(--carbon);border:1px solid var(--line);border-radius:11px;padding:5px;display:flex;flex-direction:column;gap:4px;}
  .m .team{display:flex;align-items:center;gap:8px;padding:12px 12px;border-radius:7px;cursor:pointer;background:var(--carbon2);
    border:1px solid transparent;font-size:13.5px;font-weight:600;transition:.12s;min-height:46px;}
  .m .team:hover{background:#1e2331;}
  .m .team.win{background:rgba(61,245,196,.13);border-color:var(--nitro);color:#eafff9;font-weight:800;}
  .m .team.win::after{content:"✓";margin-left:auto;color:var(--nitro);font-weight:800;}
  .m .team.win.locked{border-color:var(--purple);background:rgba(166,130,255,.14);color:#f1ecff;}
  .m .team.win.locked::after{content:"🔒";color:var(--purple);font-size:12px;}
  .m .team .flag{font-size:15px;}
  .m .team .tscore{margin-left:8px;font-family:var(--mono);font-weight:800;font-size:14px;color:var(--dim);}
  .m .team.win .tscore{color:var(--nitro);}
  .m .team.tbd{opacity:.4;cursor:default;font-style:italic;font-weight:500;}
  .m .team.tbd:hover{background:var(--carbon2);}
  .vs{text-align:center;font-family:var(--mono);font-size:8.5px;color:var(--dim);letter-spacing:.2em;}
  .vs.live{color:var(--red);font-weight:800;font-size:10px;letter-spacing:.1em;animation:pulseLive 1.4s infinite;}
  @keyframes pulseLive{0%,100%{opacity:1;}50%{opacity:.35;}}
  .vs.sched{color:var(--amber);font-size:10px;letter-spacing:normal;font-weight:600;}

  .espnstatus{font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--carbon);
    border:1px solid var(--line);border-radius:9px;padding:10px 13px;margin-bottom:16px;display:flex;align-items:center;flex-wrap:wrap;gap:2px;}
  .espnstatus b{color:var(--text);}
  .espnstatus .ok{color:var(--nitro);}
  .espnstatus .err{color:var(--red);}

  .savebar{position:sticky;bottom:12px;margin-top:20px;display:flex;gap:10px;justify-content:center;z-index:10;}
  .statebar{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
  .sbtn{font-family:var(--mono);font-size:12px;letter-spacing:.06em;padding:12px 16px;border-radius:9px;
    background:var(--carbon);border:1px solid var(--line2);color:var(--text);cursor:pointer;transition:.14s;font-weight:600;min-height:44px;}
  .sbtn:hover{background:var(--carbon2);border-color:var(--nitro);color:var(--nitro);}
  .sbtn.danger:hover{border-color:var(--red);color:var(--red);}
  .statebox{width:100%;margin-top:10px;height:80px;background:var(--ink);border:1px solid var(--line2);border-radius:9px;
    color:var(--nitro);font-family:var(--mono);font-size:11px;padding:11px;resize:vertical;}

  /* forecast */
  .fc-intro{color:var(--dim);font-family:var(--mono);font-size:13px;padding:20px 2px;}
  .fc-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 14px;flex-wrap:wrap;}
  .fc-headright{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .fc-modes{display:flex;gap:3px;background:var(--carbon);border:1px solid var(--line);border-radius:9px;padding:3px;}
  .fc-mode{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);
    background:transparent;border:none;border-radius:7px;padding:7px 11px;cursor:pointer;transition:.15s;}
  .fc-mode:hover{color:var(--text);}
  .fc-mode.on{background:var(--nitro);color:var(--ink);font-weight:800;}
  .fc-title{font-size:20px;font-weight:800;letter-spacing:-.01em;}
  .fc-sub{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em;margin-top:3px;}
  .fc-board{display:flex;flex-direction:column;gap:8px;}
  .fc-row{display:grid;grid-template-columns:26px 150px 1fr auto auto;gap:12px;align-items:center;
    background:var(--carbon);border:1px solid var(--line);border-radius:12px;padding:12px 15px;}
  .fc-rank{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--dim);text-align:center;}
  .fc-who{min-width:0;}
  .fc-nm{font-size:15px;font-weight:800;cursor:pointer;width:fit-content;}
  .fc-nm:hover{color:var(--nitro);text-decoration:underline;}
  .fc-champ{font-family:var(--mono);font-size:10.5px;color:var(--dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .fc-out{color:var(--red);}
  .fc-barwrap{height:8px;background:var(--carbon2);border-radius:99px;overflow:hidden;}
  .fc-bar{height:100%;background:linear-gradient(90deg,var(--nitro),var(--amber));border-radius:99px;transition:width .5s;}
  .fc-pct{font-family:var(--mono);font-size:19px;font-weight:800;text-align:right;min-width:64px;}
  .fc-pct span{font-size:12px;color:var(--dim);font-weight:600;}
  .fc-avg{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:right;min-width:56px;}
  .fc-path{grid-column:1/-1;font-family:var(--mono);font-size:10.5px;color:var(--amber);margin-top:2px;line-height:1.5;}
  .fc-note{margin-top:16px;padding:13px 15px;background:rgba(255,140,66,.06);border:1px solid rgba(255,140,66,.2);
    border-radius:10px;font-size:12px;line-height:1.55;color:#c9b8a6;}
  @media(max-width:540px){
    .fc-row{grid-template-columns:22px 1fr auto;gap:9px;}
    .fc-barwrap{display:none;}
    .fc-avg{display:none;}
  }
  .exp{font-family:var(--mono);font-size:11.5px;color:var(--dim);text-align:center;margin-top:14px;line-height:1.6;}
  .tab-intro{color:var(--dim);font-size:13px;line-height:1.5;margin-bottom:16px;max-width:64ch;}

  /* money match */
  .mm-card{background:var(--carbon);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:12px;}
  .mm-card.top{border-color:var(--gold);background:rgba(255,209,92,.06);}
  .mm-round{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
  .mm-teams{font-size:16px;font-weight:800;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
  .mm-vs{font-family:var(--mono);font-size:10px;color:var(--dim);}
  .mm-stakes{font-family:var(--mono);font-size:11px;color:var(--amber);margin-bottom:6px;}
  .mm-sides{display:flex;gap:18px;flex-wrap:wrap;font-family:var(--mono);font-size:11.5px;color:var(--dim);}
  .mm-sides b{color:var(--text);}

  /* what-if sandbox */
  .m .team.hypo{background:rgba(255,209,92,.15);border-color:var(--gold);color:#fff6da;font-weight:800;}
  .m .team.hypo::after{content:"?";margin-left:auto;color:var(--gold);font-weight:800;}
  .m .team.fixed{cursor:default;}
  .m .team.fixed:hover{background:var(--carbon2);}

  /* odds timeline */
  #timelineSlider{-webkit-appearance:none;height:6px;border-radius:99px;background:var(--carbon2);outline:none;}
  #timelineSlider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--nitro);cursor:pointer;}
  #timelineSlider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--nitro);cursor:pointer;border:none;}

  /* win% history chart */
  .wp-card{background:var(--carbon);border:1px solid var(--line);border-radius:14px;padding:16px 16px 10px;margin-bottom:18px;}
  .wp-title{font-size:16px;font-weight:800;letter-spacing:-.01em;margin-bottom:2px;}
  .wp-sub{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.03em;margin-bottom:10px;}
  .wp-legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 2px 2px;font-family:var(--mono);font-size:11px;color:var(--dim);}
  .wp-legend .key{display:inline-flex;align-items:center;gap:6px;}
  .wp-legend .sw{width:12px;height:2px;border-radius:2px;display:inline-block;}
  .wp-svg{width:100%;height:auto;display:block;overflow:visible;}
  .wp-grid{stroke:var(--line);stroke-width:1;}
  .wp-axis-lbl{font-family:var(--mono);font-size:9.5px;fill:var(--dim);}
  .wp-line{fill:none;stroke-width:2;stroke-linejoin:round;stroke-linecap:round;}
  .wp-endlbl{font-family:var(--mono);font-size:10px;font-weight:700;fill:var(--text);}
  .wp-pinline{stroke:var(--dim);stroke-width:1;stroke-dasharray:3,3;}
  .wp-hoverline{stroke:var(--text);stroke-width:1;opacity:.35;pointer-events:none;}
  .wp-dot{stroke:var(--carbon);stroke-width:2;pointer-events:none;}
  .wp-tip{position:absolute;background:var(--carbon2);border:1px solid var(--line2);border-radius:9px;
    padding:8px 10px;font-family:var(--mono);font-size:11px;pointer-events:none;white-space:nowrap;
    box-shadow:0 6px 20px rgba(0,0,0,.25);z-index:5;}
  .wp-tip .hd{color:var(--dim);margin-bottom:5px;font-size:10px;}
  .wp-tip .row{display:flex;align-items:center;gap:7px;justify-content:space-between;padding:1.5px 0;}
  .wp-tip .row .nm{color:var(--dim);}
  .wp-tip .row .val{color:var(--text);font-weight:800;margin-left:14px;}
  .wp-tip .key{width:10px;height:2px;border-radius:2px;display:inline-block;flex:0 0 auto;}
  .wp-overlay{fill:transparent;cursor:crosshair;}

  /* player bracket drill-down */
  .pbrk-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line);}
  .pbrk-title{font-size:22px;font-weight:900;letter-spacing:-.02em;}
  .pbrk-champ{font-family:var(--mono);font-size:12px;color:var(--dim);margin-left:auto;}
  .pbrk-cols{display:flex;gap:16px;overflow-x:auto;padding-bottom:10px;}
  .pbrk-col{flex:0 0 172px;display:flex;flex-direction:column;gap:10px;}
  .pbrk-col h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:0 0 2px;}
  .pbox{background:var(--carbon);border:1px solid var(--line);border-radius:9px;padding:10px 11px;
    font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;min-height:20px;}
  .pbox.correct{border-color:var(--nitro);background:rgba(61,245,196,.13);color:#eafff9;}
  .pbox.wrong{border-color:var(--red);background:rgba(255,77,77,.10);color:#ffc7c7;}
  .pbox.wrong .pk{text-decoration:line-through;opacity:.75;}
  .pbox.pending{opacity:.55;}
  .pbox .actual{display:block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--dim);margin-top:2px;}
  @media(max-width:540px){ .pbrk-champ{margin-left:0;width:100%;} }

  footer{margin-top:36px;padding-top:16px;border-top:1px solid var(--line);font-family:var(--mono);
    font-size:10.5px;color:var(--dim);letter-spacing:.06em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
  @media(max-width:540px){
    .brand h1{font-size:27px;}
    .row{grid-template-columns:28px 1fr auto;padding:12px 13px;gap:10px;}
    .score .pts{font-size:20px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <span class="eyebrow">2026 World Cup · Knockouts</span>
      <h1>GOLF GANG</h1>
      <span class="tag">Six brackets. One champion. No mulligans.</span>
    </div>
    <div class="tabs">
      <button class="tab on" data-view="standings">Standings</button>
      <button class="tab" data-view="forecast">Forecast</button>
      <button class="tab" data-view="admin">Results</button>
      <button class="tab" data-view="moneymatch">Money Match</button>
      <button class="tab" data-view="whatif">What If</button>
      <button class="tab" data-view="timeline">Odds Timeline</button>
    </div>
    <button id="themeToggle" class="themebtn" title="Toggle light/dark">☀︎</button>
  </header>

  <div id="standings"></div>
  <div id="forecast" style="display:none;"></div>
  <div id="admin" class="admin" style="display:none;"></div>
  <div id="playerbracket" style="display:none;"></div>
  <div id="moneymatch" style="display:none;"></div>
  <div id="whatif" style="display:none;"></div>
  <div id="timeline" style="display:none;"></div>

  <footer>
    <span id="foot-status">— matches scored —</span>
    <span>Golf Gang · scale 25·50·100·200·400 · max 2000</span>
  </footer>
</div>

<script>
/* ============ FIELD ============ */
const FLAG={"Germany":"🇩🇪","Paraguay":"🇵🇾","France":"🇫🇷","Sweden":"🇸🇪","South Africa":"🇿🇦","Canada":"🇨🇦","Netherlands":"🇳🇱","Morocco":"🇲🇦","Portugal":"🇵🇹","Croatia":"🇭🇷","Spain":"🇪🇸","Austria":"🇦🇹","United States":"🇺🇸","Bosnia-Herz":"🇧🇦","Belgium":"🇧🇪","Senegal":"🇸🇳","Brazil":"🇧🇷","Japan":"🇯🇵","Ivory Coast":"🇨🇮","Norway":"🇳🇴","Mexico":"🇲🇽","Ecuador":"🇪🇨","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Congo DR":"🇨🇩","Argentina":"🇦🇷","Cape Verde":"🇨🇻","Australia":"🇦🇺","Egypt":"🇪🇬","Switzerland":"🇨🇭","Algeria":"🇩🇿","Colombia":"🇨🇴","Ghana":"🇬🇭"};

const R32_PAIRS=[
 ["Germany","Paraguay"],["France","Sweden"],["South Africa","Canada"],["Netherlands","Morocco"],

/* ============ RESULTS — actual winners as games finish. null = not played yet. ============ */
/* Populated automatically by the ESPN adapter (below). No hardcoded winners: every round */
/* starts null and gets backfilled from finished fixtures. A manual click in the Results tab */
/* sets a slot AND marks it human-locked (LOCKED) so the poller will never overwrite it — */
/* click the locked winner again to clear both the result and the lock. */
const RESULTS_DEFAULT={r32:Array(16).fill(null),r16:Array(8).fill(null),r8:Array(4).fill(null),r4:Array(2).fill(null),r2:Array(1).fill(null)};
const LOCKED_DEFAULT={r32:Array(16).fill(false),r16:Array(8).fill(false),r8:Array(4).fill(false),r4:Array(2).fill(false),r2:Array(1).fill(false)};
const DECIDED_AT_DEFAULT={r32:Array(16).fill(null),r16:Array(8).fill(null),r8:Array(4).fill(null),r4:Array(2).fill(null),r2:Array(1).fill(null)};
const WHATIF_DEFAULT={r32:Array(16).fill(null),r16:Array(8).fill(null),r8:Array(4).fill(null),r4:Array(2).fill(null),r2:Array(1).fill(null)};
// What-If sandbox state — intentionally not persisted; it's scratch space, reset on reload.
let WHATIF=structuredClone(WHATIF_DEFAULT);
const ESPN_STATUS_DEFAULT={lastPoll:null,lastError:null,lastWritten:0};
const LS_KEY="golfgang_state_v2";

function loadState(){
  const fallback={results:structuredClone(RESULTS_DEFAULT),locked:structuredClone(LOCKED_DEFAULT),decidedAt:structuredClone(DECIDED_AT_DEFAULT),espn:structuredClone(ESPN_STATUS_DEFAULT)};
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return fallback;
    const parsed=JSON.parse(raw);
    for(const r of ROUNDS){
      if(!Array.isArray(parsed?.results?.[r.key])||parsed.results[r.key].length!==r.m) return fallback;
      if(!Array.isArray(parsed?.locked?.[r.key])||parsed.locked[r.key].length!==r.m) return fallback;
    }
    if(!parsed.espn) parsed.espn=structuredClone(ESPN_STATUS_DEFAULT);
    if(!parsed.decidedAt) parsed.decidedAt=structuredClone(DECIDED_AT_DEFAULT);
    return parsed;
  }catch(e){ return fallback; }
}
function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({results:RESULTS,locked:LOCKED,decidedAt:DECIDED_AT,espn:ESPN_STATUS})); }
  catch(e){ /* storage full/blocked — state still lives in memory this session */ }
}
const _state=loadState();
let RESULTS=_state.results, LOCKED=_state.locked, DECIDED_AT=_state.decidedAt, ESPN_STATUS=_state.espn;
function saveResults(){ saveState(); }

// Live/finished scoreboard cache — refreshed in full every poll, not persisted (ESPN is the source of truth for this).
let SCORES={r32:Array(16).fill(null),r16:Array(8).fill(null),r8:Array(4).fill(null),r4:Array(2).fill(null),r2:Array(1).fill(null)};
// DraftKings win probabilities per slot, keyed the same way as SCORES — {a,b} win probs matching
// actualFeeders(ri,mi) order. null until both real teams are locked in AND DK has posted a line.
let ODDS={r32:Array(16).fill(null),r16:Array(8).fill(null),r8:Array(4).fill(null),r4:Array(2).fill(null),r2:Array(1).fill(null)};

/* ============ ESPN ADAPTER ============ */
// ESPN displayName -> this bracket's team name. Only entry needed: the rest of the 32 already match.
const ESPN_NAME_MAP={"Bosnia-Herzegovina":"Bosnia-Herz"};
const KNOWN_TEAMS=new Set(Object.keys(FLAG));
function normalizeTeam(espnName){
  const mapped=ESPN_NAME_MAP[espnName]??espnName;
  if(!KNOWN_TEAMS.has(mapped)) console.warn(`[ESPN adapter] unmapped team name "${espnName}" (normalized "${mapped}") — not one of the 32 bracket teams.`);
  return mapped;
}

// Approx real-world date window per round — used only as a non-blocking sanity check.
// Slot resolution itself is by feeder-pair match (see below), which is unambiguous by construction.
const ROUND_WINDOWS={
  r32:["2026-06-28","2026-07-04"], r16:["2026-07-04","2026-07-07"], r8:["2026-07-09","2026-07-11"],
  r4:["2026-07-14","2026-07-19"], r2:["2026-07-19","2026-07-19"],
};
function checkRoundWindow(key,isoDate){
  const [s,e]=ROUND_WINDOWS[key], d=isoDate.slice(0,10);
  if(d<s||d>e) console.warn(`[ESPN adapter] ${key} fixture dated ${d} falls outside expected window ${s}..${e} — double-check the mapping.`);
}

const ESPN_KNOCKOUT_START="20260628", ESPN_TOURNAMENT_END="20260719";
function rollingWindow(){
  const today=new Date(), lookahead=new Date(today.getTime()+3*86400000);
  let end=lookahead.toISOString().slice(0,10).replace(/-/g,"");
  if(end>ESPN_TOURNAMENT_END) end=ESPN_TOURNAMENT_END;
  return {start:ESPN_KNOCKOUT_START, end};
}

// American odds -> implied probability, e.g. -225 -> .692, +750 -> .118.
function americanToImplied(odds){
  const n=typeof odds==="string"?parseFloat(odds):odds;
  if(!isFinite(n)) return null;
  return n>0 ? 100/(n+100) : -n/(-n+100);
}
// DraftKings 3-way moneyline (home/draw/away) -> de-vigged 2-way win probs by team name,
// splitting the draw's probability mass 50/50 into each side's win column.
function moneylineToWinProbs(dkOdds,homeTeam,awayTeam){
  const ml=dkOdds?.moneyline; if(!ml||!homeTeam||!awayTeam) return null;
  const pHome=americanToImplied(ml.home?.close?.odds??ml.home?.open?.odds);
  const pAway=americanToImplied(ml.away?.close?.odds??ml.away?.open?.odds);
  const pDraw=americanToImplied(ml.draw?.close?.odds??ml.draw?.open?.odds);
  if(pHome==null||pAway==null||pDraw==null) return null;
  const sum=pHome+pAway+pDraw; // sum > 1 is the house vig; dividing it out de-vigs
  return {[homeTeam]:(pHome+pDraw/2)/sum, [awayTeam]:(pAway+pDraw/2)/sum};
}
// Flatten ESPN's scoreboard payload into fixtures, live or finished: {teams, scores, state, clockSeconds, winner, date, odds}
function extractFixtures(data){
  const out=[];
  for(const ev of (data.events||[])){
    const comp=ev.competitions?.[0]; if(!comp) continue;
    const competitors=comp.competitors||[];
    if(competitors.length!==2) continue;
    const completed=comp.status?.type?.completed===true;
    const state=comp.status?.type?.state||"pre"; // 'pre' | 'in' | 'post'
    const clockSeconds=comp.status?.clock??null;  // elapsed match seconds, e.g. 5400 = 90'
    const teams=competitors.map(c=>normalizeTeam(c.team?.displayName||""));
    const scores={};
    competitors.forEach((c,i)=>{ scores[teams[i]]=c.score!=null?parseInt(c.score,10):null; });
    const winnerComp=competitors.find(c=>c.winner===true);
    const homeC=competitors.find(c=>c.homeAway==="home"), awayC=competitors.find(c=>c.homeAway==="away");
    const dkOdds=(comp.odds||[]).find(o=>o?.provider?.name==="DraftKings");
    const odds=dkOdds&&homeC&&awayC
      ?moneylineToWinProbs(dkOdds, normalizeTeam(homeC.team?.displayName||""), normalizeTeam(awayC.team?.displayName||""))
      :null;
    out.push({teams, scores, state, clockSeconds, winner:winnerComp?normalizeTeam(winnerComp.team.displayName):null, completed, date:comp.date||ev.date, odds});
  }
  return out;
}
function findFixture(fixtures,a,b){
  return fixtures.find(f=>f.teams.includes(a)&&f.teams.includes(b));
}

// One poll cycle: fetch, then walk rounds in order so R32 writes unlock R16 feeders in the same pass.
async function pollEspn(){
  try{
    const {start,end}=rollingWindow();
    const url=`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${start}-${end}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const fixtures=extractFixtures(data);
    let written=0;
    ROUNDS.forEach((r,ri)=>{
      for(let mi=0;mi<r.m;mi++){
        const [a,b]=actualFeeders(ri,mi);
        if(!a||!b){ SCORES[r.key][mi]=null; ODDS[r.key][mi]=null; continue; }  // feeders not known yet this pass
        const fx=findFixture(fixtures,a,b);
        // scores refresh every poll regardless of lock, so the Results tab always shows the live state
        SCORES[r.key][mi]=fx?{a:fx.scores[a]??null, b:fx.scores[b]??null, state:fx.state, clockSeconds:fx.clockSeconds, date:fx.date}:null;
        // market prior refreshes every poll too — DK odds move right up until kickoff
        ODDS[r.key][mi]=(fx&&fx.odds&&fx.odds[a]!=null&&fx.odds[b]!=null)?{a:fx.odds[a],b:fx.odds[b]}:null;
        // ESPN always reports the true original fixture date, so this backfills correctly no matter
        // when we happen to poll — Odds Timeline needs this to replay history in real chronological order.
        if(fx && fx.completed) DECIDED_AT[r.key][mi]=fx.date;
        if(LOCKED[r.key][mi]) continue;           // human override — never touch RESULTS
        if(RESULTS[r.key][mi]!==null) continue;   // already resolved
        if(fx && fx.completed && fx.winner){
          RESULTS[r.key][mi]=fx.winner;
          checkRoundWindow(r.key, fx.date);
          written++;
        }
      }
    });
    if(written>0) cascadeResults();
    forecastCache=null; // live scores/clocks/market odds all change even without a new written result
    ESPN_STATUS={lastPoll:new Date().toISOString(), lastError:null, lastWritten:written};
    saveState();
  }catch(e){
    ESPN_STATUS={...ESPN_STATUS, lastPoll:new Date().toISOString(), lastError:String(e.message||e)};
    saveState();
    console.warn("[ESPN adapter] poll failed, keeping cached/localStorage results:", e);
  }finally{
    renderAdmin(); renderStandings();
    const activeTab=document.querySelector(".tab.on")?.dataset.view;
    if(activeTab==="forecast") renderForecast(false);
    if(activeTab==="moneymatch") renderMoneyMatch();
    if(activeTab==="whatif") renderWhatIf();
    if(activeTab==="timeline") renderTimeline();
  }
}

/* ============ ENGINE ============ */
// Every engine function below takes an optional `res` results-object (defaults to the live RESULTS).
// That's what lets the What-If sandbox and Odds Timeline replay run the exact same scoring logic
// against a hypothetical or partial-history results set instead of duplicating it.
// actual feeders for a results match: r32 from pairs, later from actual results
function actualFeeders(ri,mi,res=RESULTS){
  if(ri===0)return R32_PAIRS[mi];
  return [res[ROUNDS[ri-1].key][mi*2],res[ROUNDS[ri-1].key][mi*2+1]];
}
// a player's pick for (round, match)
function pickAt(pl,ri,mi){return PLAYERS[pl][ROUNDS[ri].key][mi];}

// EARNED: pick is correct if it matches the actual winner of that match slot
function earned(pl,res=RESULTS){
  let s=0;
  ROUNDS.forEach((r,ri)=>{
    res[r.key].forEach((win,mi)=>{
      if(win!==null && pickAt(pl,ri,mi)===win) s+=r.pts;
    });
  });
  return s;
}
// STILL ALIVE: a player's pick for a slot is still possible if that team hasn't been eliminated
// A team is eliminated if, in any completed match, it was a feeder but not the winner.
function eliminatedTeams(res=RESULTS){
  const dead=new Set();
  ROUNDS.forEach((r,ri)=>{
    res[r.key].forEach((win,mi)=>{
      if(win!==null){
        const [a,b]=actualFeeders(ri,mi,res);
        if(a&&a!==win)dead.add(a);
        if(b&&b!==win)dead.add(b);
      }
    });
  });
  return dead;
}
// MAX POSSIBLE = earned + sum of points for unplayed slots where the player's pick is still alive
function maxPossible(pl,res=RESULTS){
  const dead=eliminatedTeams(res);
  let s=0;
  ROUNDS.forEach((r,ri)=>{
    res[r.key].forEach((win,mi)=>{
      const pick=pickAt(pl,ri,mi);
      if(win!==null){ if(pick===win)s+=r.pts; }        // already earned
      else { if(!dead.has(pick))s+=r.pts; }             // still gettable
    });
  });
  return s;
}
function championAlive(pl,res=RESULTS){
  return !eliminatedTeams(res).has(PLAYERS[pl].r2[0]);
}
function matchesScored(res=RESULTS){
  let n=0;ROUNDS.forEach(r=>res[r.key].forEach(w=>{if(w!==null)n++;}));return n;
}

/* ============ RENDER: STANDINGS ============ */
function renderStandings(){
  const el=document.getElementById("standings");
  const rows=Object.keys(PLAYERS).map(pl=>({
    pl, earned:earned(pl), max:maxPossible(pl), champ:PLAYERS[pl].r2[0], champAlive:championAlive(pl)
  }));
  // sort: earned desc, then max desc, then name
  rows.sort((a,b)=> b.earned-a.earned || b.max-a.max || a.pl.localeCompare(b.pl));
  const globalMax=Math.max(...rows.map(r=>r.max),1);

  let h=`<div class="board">`;
  rows.forEach((r,i)=>{
    const rank=i+1;
    const cls=rank<=3?`p${rank}`:"";
    const champTxt=r.champAlive
      ? `champion: <span class="alive">${FLAG[r.champ]} ${r.champ}</span>`
      : `champion: <span class="out">${FLAG[r.champ]} ${r.champ}</span>`;
    const ePct=(r.earned/globalMax*100).toFixed(1);
    const pPct=(r.max/globalMax*100).toFixed(1);
    h+=`<div class="row ${cls}">
      <div class="rank">${rank}</div>
      <div class="who">
        <div class="nm" data-pl="${r.pl}">${r.pl}</div>
        <div class="champ">${champTxt}</div>
      </div>
      <div class="score">
        <div class="pts">${r.earned}</div>
        <div class="ceil">ceiling <b>${r.max}</b></div>
      </div>
      <div class="barwrap">
        <div class="bar-poss" style="left:${ePct}%;width:${(pPct-ePct)}%"></div>
        <div class="bar-earned" style="width:${ePct}%"></div>
      </div>
    </div>`;
  });
  h+=`</div>
    <div class="legend">
      <span><span class="dot e"></span> points banked</span>
      <span><span class="dot p"></span> still reachable (ceiling)</span>
    </div>`;
  el.innerHTML=h;
  document.getElementById("foot-status").textContent=`${matchesScored()} / 31 matches scored`;
  el.querySelectorAll(".nm[data-pl]").forEach(node=>{
    node.onclick=()=>{ renderPlayerBracket(node.dataset.pl); showView("playerbracket"); };
  });
}

/* ============ RENDER: PLAYER BRACKET ============ */
function renderPlayerBracket(pl){
  const el=document.getElementById("playerbracket");
  const champ=PLAYERS[pl].r2[0];
  const alive=championAlive(pl);
  let h=`<div class="pbrk-head">
      <button class="sbtn" id="pbrkBack">← Standings</button>
      <div class="pbrk-title">${pl}'s Bracket</div>
      <div class="pbrk-champ">champion pick: ${FLAG[champ]||"⚽"} ${champ} ${alive?'<span style="color:var(--nitro)">(alive)</span>':'<span style="color:var(--red)">(eliminated)</span>'}</div>
    </div>
    <div class="pbrk-cols">`;
  ROUNDS.forEach((r,ri)=>{
    h+=`<div class="pbrk-col"><h4>${r.name}</h4>`;
    for(let mi=0;mi<r.m;mi++){
      const pick=pickAt(pl,ri,mi);
      const win=RESULTS[r.key][mi];
      let cls="pending", actualTxt="";
      if(win!==null){
        if(win===pick) cls="correct";
        else{ cls="wrong"; actualTxt=`<span class="actual">${FLAG[win]||"⚽"} ${win} won</span>`; }
      }
      h+=`<div class="pbox ${cls}">
        <span class="flag">${FLAG[pick]||"⚽"}</span>
        <span>
          <span class="pk">${pick}</span>
          ${actualTxt}
        </span>
      </div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  el.innerHTML=h;
  el.querySelector("#pbrkBack").onclick=()=>showView("standings");
}

/* ============ RENDER: ADMIN ============ */
function renderAdmin(){
  const el=document.getElementById("admin");
  const lockedCt=ROUNDS.reduce((n,r)=>n+LOCKED[r.key].filter(Boolean).length,0);
  const autoCt=ROUNDS.reduce((n,r)=>n+RESULTS[r.key].filter((w,i)=>w!==null&&!LOCKED[r.key][i]).length,0);
  const pollTxt=ESPN_STATUS.lastPoll?new Date(ESPN_STATUS.lastPoll).toLocaleTimeString():"never";
  const feedTxt=ESPN_STATUS.lastError
    ? `<span class="err">error: ${ESPN_STATUS.lastError}</span>`
    : `<span class="ok">healthy</span>`;
  let h=`<p class="intro">Results auto-write from ESPN as games finish (polling every 2 min). Click a team to manually set/override a winner — that locks it 🔒 so the poller won't touch it again; click the locked winner again to release the lock back to auto.</p>
    <div class="espnstatus">ESPN feed — last poll <b>${pollTxt}</b> · auto-written <b>${autoCt}</b> · human-locked <b>${lockedCt}</b> · ${feedTxt}
      <button class="sbtn" id="pollNow" style="margin-left:10px;padding:6px 10px;font-size:11px;">Poll now</button>
    </div>`;
  ROUNDS.forEach((r,ri)=>{
    const done=RESULTS[r.key].filter(w=>w!==null).length;
    h+=`<div class="rd"><h3>${r.name} <span class="ct">${done}/${r.m}</span></h3><div class="matchgrid">`;
    for(let mi=0;mi<r.m;mi++){
      const [a,b]=actualFeeders(ri,mi);
      const sc=SCORES[r.key][mi];
      h+=`<div class="m">`;
      [a,b].forEach((t,idx)=>{
        if(t===null){h+=`<div class="team tbd">awaiting result</div>`;}
        else{
          const win=RESULTS[r.key][mi]===t;
          const locked=win&&LOCKED[r.key][mi];
          const sVal=sc?(idx===0?sc.a:sc.b):null;
          const showScore=sc&&(sc.state==="in"||sc.state==="post")&&sVal!=null;
          h+=`<div class="team${win?" win":""}${locked?" locked":""}" data-r="${ri}" data-m="${mi}" data-t="${t}">
            <span class="flag">${FLAG[t]||"⚽"}</span>${t}${showScore?`<span class="tscore">${sVal}</span>`:""}</div>`;
        }
      });
      let vsTxt="▼", vsCls="";
      if(sc&&sc.state==="in"){ vsTxt=`LIVE ${Math.min(90,Math.floor((sc.clockSeconds||0)/60))}'`; vsCls=" live"; }
      else if(sc&&sc.state==="pre"&&sc.date){
        vsTxt=new Date(sc.date).toLocaleString(undefined,{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
        vsCls=" sched";
      }
      h+=`<div class="vs${vsCls}">${vsTxt}</div></div>`;
    }
    h+=`</div></div>`;
  });
  h+=`<div class="statebar">
      <button class="sbtn" id="exportState">Export state</button>
      <button class="sbtn" id="importState">Import state</button>
      <button class="sbtn danger" id="resetState">Reset results</button>
    </div>
    <div class="exp">Results auto-save to this browser. <span style="color:var(--nitro)">Export state</span> gives you a JSON backup to paste back if the browser cache clears.</div>
    <textarea id="stateBox" class="statebox" placeholder="Paste exported state here, then click Import state again to load it." style="display:none;"></textarea>`;
  el.innerHTML=h;

  el.querySelector("#pollNow").onclick=()=>pollEspn();

  // export/import/reset handlers
  const box=el.querySelector("#stateBox");
  el.querySelector("#exportState").onclick=()=>{
    box.style.display="block";
    box.value=JSON.stringify({results:RESULTS,locked:LOCKED});
    box.select();
    try{navigator.clipboard.writeText(box.value);}catch(e){}
    flash("#exportState","Copied ✓");
  };
  el.querySelector("#importState").onclick=()=>{
    if(box.style.display==="none"){ box.style.display="block"; box.value=""; box.focus(); flash("#importState","Paste, then click again"); return; }
    try{
      const parsed=JSON.parse(box.value.trim());
      const res=parsed.results||parsed; // accept old export shape (bare RESULTS) too
      const lock=parsed.locked||structuredClone(LOCKED_DEFAULT);
      for(const r of ROUNDS){
        if(!Array.isArray(res[r.key])||res[r.key].length!==r.m) throw new Error("bad shape");
        if(!Array.isArray(lock[r.key])||lock[r.key].length!==r.m) throw new Error("bad shape");
      }
      RESULTS=res; LOCKED=lock; cascadeResults(); saveResults();
      renderAdmin(); renderStandings(); flash("#importState","Imported ✓");
    }catch(e){ flash("#importState","Invalid — check the text"); }
  };
  el.querySelector("#resetState").onclick=()=>{
    if(!confirm("Clear ALL entered results? Your player brackets are untouched; this only wipes match outcomes and unlocks everything for ESPN auto-write."))return;
    RESULTS=structuredClone(RESULTS_DEFAULT); LOCKED=structuredClone(LOCKED_DEFAULT); DECIDED_AT=structuredClone(DECIDED_AT_DEFAULT); winPctSeriesCache=null; saveResults(); renderAdmin(); renderStandings();
  };

  el.querySelectorAll(".team[data-r]").forEach(node=>{
    node.onclick=()=>{
      const ri=+node.dataset.r,mi=+node.dataset.m,t=node.dataset.t;
      const key=ROUNDS[ri].key;
      const cur=RESULTS[key][mi];
      if(cur===t){ RESULTS[key][mi]=null; LOCKED[key][mi]=false; }   // clear -> release back to auto
      else{ RESULTS[key][mi]=t; LOCKED[key][mi]=true; }               // set -> human lock
      // cascade: clear downstream results (and their locks) that no longer have valid feeders
      cascadeResults();
      saveResults();
      forecastCache=null;
      renderAdmin();renderStandings();
    };
  });
}
function cascadeResults(){
  for(let ri=1;ri<ROUNDS.length;ri++){
    for(let mi=0;mi<ROUNDS[ri].m;mi++){
      const [a,b]=actualFeeders(ri,mi);
      const key=ROUNDS[ri].key;
      const cur=RESULTS[key][mi];
      if(cur!==null && cur!==a && cur!==b){ RESULTS[key][mi]=null; LOCKED[key][mi]=false; DECIDED_AT[key][mi]=null; }
    }
  }
  winPctSeriesCache=null; // called from every RESULTS-mutating path — cheapest single invalidation point
}

/* ============ RENDER: MONEY MATCH ============ */
// Deterministic (no simulation needed): for every still-open match, how much would the pool's
// standings actually move between "team A wins" and "team B wins"? Only players whose own pick for
// this exact slot is A or B are affected — if everyone picked the same team, the outcome doesn't
// separate anyone, so it isn't a money match no matter how big the round's point value is.
function computeMoneyMatches(){
  const rows=[];
  ROUNDS.forEach((r,ri)=>{
    for(let mi=0;mi<r.m;mi++){
      if(RESULTS[r.key][mi]!==null) continue;
      const [a,b]=actualFeeders(ri,mi);
      if(!a||!b) continue;
      const deltas=Object.keys(PLAYERS).map(pl=>{
        const pick=pickAt(pl,ri,mi);
        return {pl, delta: pick===a?r.pts:(pick===b?-r.pts:0)};
      });
      const stakes=Math.max(...deltas.map(d=>d.delta)) - Math.min(...deltas.map(d=>d.delta));
      if(stakes<=0) continue;
      rows.push({
        ri,mi,round:r.name,pts:r.pts,a,b,stakes,
        forA:deltas.filter(d=>d.delta>0).map(d=>d.pl),
        forB:deltas.filter(d=>d.delta<0).map(d=>d.pl),
        sc:SCORES[r.key][mi],
      });
    }
  });
  rows.sort((a,b)=>b.stakes-a.stakes);
  return rows;
}
function renderMoneyMatch(){
  const el=document.getElementById("moneymatch");
  const rows=computeMoneyMatches();
  if(rows.length===0){
    el.innerHTML=`<p class="tab-intro">Nothing splits the pool right now — either every open match has everyone picking the same team, or every match's already decided. Check back as new rounds open up.</p>`;
    return;
  }
  let h=`<p class="tab-intro">The matches that will actually shuffle the standings — ranked by how many points separate the players rooting for each side. A lopsided pick (everyone agrees) doesn't move anyone; a split pick is where the real stakes are.</p>`;
  rows.forEach((r,i)=>{
    const live=r.sc&&r.sc.state==="in";
    const scoreTxt = r.sc&&(r.sc.state==="in"||r.sc.state==="post") ? ` <span style="color:var(--dim)">(${r.sc.a}-${r.sc.b}${live?` · LIVE ${Math.min(90,Math.floor((r.sc.clockSeconds||0)/60))}'`:''})</span>` : "";
    h+=`<div class="mm-card${i===0?" top":""}">
      <div class="mm-round">${r.round} · ${r.pts} pts</div>
      <div class="mm-teams">${FLAG[r.a]||"⚽"} ${r.a} <span class="mm-vs">vs</span> ${FLAG[r.b]||"⚽"} ${r.b}${scoreTxt}</div>
      <div class="mm-stakes">${r.stakes} points could separate the pool depending on this result</div>
      <div class="mm-sides">
        <span>${r.a}: <b>${r.forA.length?r.forA.join(", "):"nobody"}</b></span>
        <span>${r.b}: <b>${r.forB.length?r.forB.join(", "):"nobody"}</b></span>
      </div>
    </div>`;
  });
  el.innerHTML=h;
}

/* ============ RENDER: WHAT-IF SANDBOX ============ */
function mergedResults(){

}
function cascadeWhatIf(){
  for(let ri=1;ri<ROUNDS.length;ri++){
    for(let mi=0;mi<ROUNDS[ri].m;mi++){
      const merged=mergedResults();

      const key=ROUNDS[ri].key;
      const cur=WHATIF[key][mi];

}

/* ============ RENDER: ODDS TIMELINE ============ */
// Reconstructed purely from each result's real completion date (ESPN's true fixture date, backfilled
// regardless of when we polled) — so this replays history as it actually happened, not as we happened
// to observe it. Stepping the slider back genuinely hides later results from the standings math.
function decidedEventsChronological(){
  const events=[];
  ROUNDS.forEach((r,ri)=>{
    for(let mi=0;mi<r.m;mi++){
      const dt=DECIDED_AT[r.key][mi];
      if(dt && RESULTS[r.key][mi]!==null) events.push({ri,mi,key:r.key,round:r.name,winner:RESULTS[r.key][mi],date:dt});
    }
  });
  events.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return events;
}
function partialResultsUpTo(events,k){
  const partial=structuredClone(RESULTS_DEFAULT);
  for(let i=0;i<k;i++){ const e=events[i]; partial[e.key][e.mi]=e.winner; }
  return partial;
}

/* ============ WIN% HISTORY CHART ============ */
// Market prior for a REPLAYED (partial-history) simulation. ODDS is keyed by today's real,
// currently-locked bracket — but a simulated trajectory over a partial-results snapshot can send
// hypothetical teams into a slot that, in reality, ended up holding different teams. Applying
// today's real line to whichever teams the simulation happens to land there would misattribute a
// real bookmaker's number to the wrong matchup. So this only trusts ODDS when the simulated path
// has exactly reproduced today's actual bracket up through this slot; otherwise it falls back to
// Elo, same silent-fallback pattern as basePrior() uses for slots with no market yet.
function basePriorForReplay(ri,mi,a,b){
  if(FORECAST_MODE==="market"){
    const mkt=ODDS[ROUNDS[ri].key][mi];
    if(mkt){
      const[ra,rb]=actualFeeders(ri,mi);
      if(a===ra && b===rb) return mkt.a;
    }
  }
  return winProb(a,b);
}
/* ---- shared win-probability engine ------------------------------------------------------
   Every still-undecided match is one binary branch, so from any position there are exactly
   2^(open slots) complete tournaments. Once that count is small we walk ALL of them and get
   exact win probabilities — no sampling noise, no Re-run jitter, and faster than a Monte Carlo
   run. Above the threshold (early rounds, up to billions of outcomes) we sample instead. Both
   the live Forecast and the timeline replay go through winStats(); they differ only in the
   probFn they pass and whether they need best-path tallies. */
const ENUM_MAX_OPEN=16; // 2^16 = 65,536 leaves — a few ms to score; more than this, sample

function openSlotList(res){
  const open=[];
  ROUNDS.forEach((r,ri)=>{ for(let mi=0;mi<r.m;mi++){ if(res[r.key][mi]===null) open.push({ri,key:r.key,mi}); } });
  return open;
}
// One sampled tournament from position `res`; probFn(ri,mi,a,b) = P(a beats b).
function simWith(res, probFn){
  const out={};
  out.r32=R32_PAIRS.map((pair,i)=>{ if(res.r32[i]!==null) return res.r32[i];
    const[a,b]=pair; return Math.random()<probFn(0,i,a,b)?a:b; });
  for(let ri=1;ri<ROUNDS.length;ri++){
    const prev=out[ROUNDS[ri-1].key], key=ROUNDS[ri].key; out[key]=[];
    for(let m=0;m<ROUNDS[ri].m;m++){
      if(res[key][m]!==null){ out[key].push(res[key][m]); continue; }
      const a=prev[m*2], b=prev[m*2+1]; out[key].push(Math.random()<probFn(ri,m,a,b)?a:b);
    }
  }
  return out;
}
// Win probability + expected score (+ optional best-path tallies) for every player from `res`.
// Weights are real branch probabilities in exact mode and 1/N per sample in MC mode, so the
// accumulation below is identical either way and every tally lands as a probability summing to 1.
function winStats(res, probFn, opts){
  opts=opts||{};
  const trackPath=!!opts.trackPath, N=opts.N||20000;
  const names=Object.keys(PLAYERS);
  const open=openSlotList(res);
  const exact=open.length<=ENUM_MAX_OPEN;
  const slotId=s=>`${s.key}:${s.mi}`;

  const winProb={}, avgScore={}; names.forEach(n=>{winProb[n]=0; avgScore[n]=0;});
  const baseTally=trackPath?{}:null, pathTally=trackPath?{}:null;
  if(trackPath){
    open.forEach(s=>baseTally[slotId(s)]={});
    names.forEach(pl=>{ pathTally[pl]={}; open.forEach(s=>pathTally[pl][slotId(s)]={}); });
  }

  function tally(outcome, w){
    let best=-Infinity, leaders=[];
    names.forEach(pl=>{ const s=scoreVsOutcome(pl,outcome); avgScore[pl]+=s*w;
      if(s>best){ best=s; leaders=[pl]; } else if(s===best){ leaders.push(pl); } });
    const share=w/leaders.length;
    leaders.forEach(pl=>winProb[pl]+=share);
    if(trackPath){
      open.forEach(s=>{ const team=outcome[s.key][s.mi], id=slotId(s);
        baseTally[id][team]=(baseTally[id][team]||0)+w;
        leaders.forEach(pl=>{ const t=pathTally[pl][id]; t[team]=(t[team]||0)+share; });
      });
    }
  }

  if(exact){
    // Fill open slots in round order; feeders of a slot are always resolved by the time we reach
    // it (they sit at an earlier round = lower index). tally() consumes `cur` synchronously, so
    // one shared mutable copy is safe — no per-leaf clone.
    const cur=structuredClone(res);
    (function recurse(idx, w){
      if(idx===open.length){ tally(cur, w); return; }
      const s=open[idx];
      const [a,b]=actualFeeders(s.ri, s.mi, cur);
      const pa=probFn(s.ri, s.mi, a, b);
      cur[s.key][s.mi]=a; recurse(idx+1, w*pa);
      cur[s.key][s.mi]=b; recurse(idx+1, w*(1-pa));
      cur[s.key][s.mi]=null;
    })(0, 1);
  } else {
    for(let i=0;i<N;i++) tally(simWith(res, probFn), 1/N);
  }

  return {names, open, slotId, winProb, avgScore, baseTally, pathTally, exact,
          outcomes: exact?Math.pow(2,open.length):N};
}
function winPctAt(res,N){
  const st=winStats(res, basePriorForReplay, {trackPath:false, N});
  const out={}; st.names.forEach(n=>out[n]=100*st.winProb[n]); return out;
}
// One winStats pass per historical checkpoint. Later checkpoints (few teams left) resolve exactly;
// early ones (many teams left) sample with N. No path-tracking, so it's cheap enough to do every
// step; cached and invalidated alongside forecastCache — both by the result-writing call sites
// (see cascadeResults) and by setForecastMode().
function computeWinPctSeries(events,N){
  const points=[];
  for(let k=0;k<=events.length;k++){
    const e=k>0?events[k-1]:null;
    points.push({k, date:e?e.date:null, roundKey:e?e.key:null, roundName:e?e.round:null,
      winner:e?e.winner:null, pct:winPctAt(partialResultsUpTo(events,k),N)});
  }
  return points;
}
const WP_W=900,WP_H=260,WP_PAD_L=30,WP_PAD_R=54,WP_PAD_T=14,WP_PAD_B=22;

function wireWinPctChart(container,points){

  container.querySelector("#wpModeElo").onclick=()=>{ if(FORECAST_MODE!=="elo"){ setForecastMode("elo"); renderTimeline(true); } };
  container.querySelector("#wpModeMarket").onclick=()=>{ if(FORECAST_MODE!=="market"){ setForecastMode("market"); renderTimeline(true); } };

  let tip=null;

    if(!tip){ tip=document.createElement("div"); tip.className="wp-tip"; wrap.appendChild(tip); }
    return tip;
  }
  function showAt(clientX,clientY,kk){

    const t=ensureTip();
    const hd=kk===0?"Pre-tournament":`${p.winner} wins the ${p.roundName}`;
    const rowsData=names.map((nm,i)=>({nm,i,pct:p.pct[nm]})).sort((a,b)=>b.pct-a.pct);
    let rowsHtml="";
    rowsData.forEach(r=>{
      rowsHtml+=`<div class="row"><span style="display:flex;align-items:center;gap:6px;"><span class="key" style="background:var(--s${r.i+1})"></span><span class="nm">${r.nm}</span></span><span class="val">${r.pct.toFixed(1)}%</span></div>`;

    const svgX=(e.clientX-rect.left)/rect.width*WP_W;
    const kk=Math.max(0,Math.min(n-1,Math.round((svgX-WP_PAD_L)/(plotW/(n-1)))));
    showAt(e.clientX,e.clientY,kk);
  });
  overlay.addEventListener("pointerleave",hide);
}

const WP_SIMS=3000;
let winPctSeriesCache=null; // {eventsLen, points} — invalidated by cascadeResults() and resetState
let timelineStep=null;
function renderTimeline(force){
  const el=document.getElementById("timeline");
  const events=decidedEventsChronological();
  if(events.length===0){
    el.innerHTML=`<p class="tab-intro">No results yet — check back once the first match finishes and this'll let you replay the pool's story — and its win% swings — as it unfolds.</p>`;
    return;
  }
  el.innerHTML=`<p class="tab-intro">Crunching win% history…</p>`;
  setTimeout(()=>{
    if(force||!winPctSeriesCache||winPctSeriesCache.eventsLen!==events.length){
      winPctSeriesCache={eventsLen:events.length, points:computeWinPctSeries(events,WP_SIMS)};
    }
    const points=winPctSeriesCache.points;
    if(timelineStep===null) timelineStep=events.length;
    const k=Math.max(0,Math.min(events.length,timelineStep));
    const partial=partialResultsUpTo(events,k);
    const rows=Object.keys(PLAYERS).map(pl=>({pl, earned:earned(pl,partial), max:maxPossible(pl,partial)}));
    rows.sort((a,b)=>b.earned-a.earned||b.max-a.max||a.pl.localeCompare(b.pl));
    const label = k===0
      ? "Before any results — pre-tournament"
      : `As of ${FLAG[events[k-1].winner]||"⚽"} ${events[k-1].winner} winning the ${events[k-1].round} · ${new Date(events[k-1].date).toLocaleDateString(undefined,{month:"short",day:"numeric"})}`;
    let h=`<p class="tab-intro">Replay the pool's standings exactly as they unfolded, one real result at a time — reconstructed from each match's true completion date, as if you didn't know anything that happened after this point.</p>`;
    h+=renderWinPctCard(points,k);
    h+=`<div class="espnstatus">${label}</div>
      <input type="range" id="timelineSlider" min="0" max="${events.length}" value="${k}">
      <div class="board" style="margin-top:16px;">`;
    rows.forEach((r,i)=>{
      h+=`<div class="row"><div class="rank">${i+1}</div>
        <div class="who"><div class="nm">${r.pl}</div></div>
        <div class="score"><div class="pts">${r.earned}</div><div class="ceil">ceiling <b>${r.max}</b></div></div>
      </div>`;
    });
    h+=`</div>`;
    el.innerHTML=h;
    el.querySelector("#timelineSlider").oninput=(e)=>{ timelineStep=+e.target.value; renderTimeline(); };
    wireWinPctChart(el,points);
  },30);
}

/* ============ MONTE CARLO FORECAST ============ */
// Forecast mode: "elo" (static Elo table, works for any hypothetical matchup) or "market" (real
// DraftKings odds via the ESPN feed, de-vigged and with the draw split 50/50 to a match winner —
// only exists for slots where both real teams are already locked in; everything deeper/hypothetical
// in the bracket has no market yet and silently falls back to Elo either way).
const FORECAST_MODE_KEY="forecast_mode_pref";
let FORECAST_MODE=(()=>{ try{ return localStorage.getItem(FORECAST_MODE_KEY)||"elo"; }catch(e){ return "elo"; } })();
function setForecastMode(mode){
  FORECAST_MODE=mode;
  try{ localStorage.setItem(FORECAST_MODE_KEY, mode); }catch(e){}
  forecastCache=null;
  winPctSeriesCache=null;
}
function basePrior(ri,mi,a,b){
  if(FORECAST_MODE==="market"){
    const mkt=ODDS[ROUNDS[ri].key][mi];
    if(mkt && mkt.a!=null && mkt.b!=null) return mkt.a;
  }
  return winProb(a,b);
}
// Live-adjusted win probability for a match in progress: blends the prior (Elo or market) with the
// current scoreline, weighted by how much of the match has elapsed (a lead late means more than the
// same lead early). This is a simple heuristic, not a calibrated live-soccer win model.
const LIVE_GOAL_WEIGHT=1.1;
function liveWinProb(prior,sc){
  const priorLogOdds=Math.log(prior/(1-prior));
  const minutesElapsed=Math.max(0,(sc.clockSeconds||0)/60);
  const timeFrac=Math.min(1,minutesElapsed/90);
  const goalDiff=sc.a-sc.b;
  const liveLogOdds=priorLogOdds + goalDiff*LIVE_GOAL_WEIGHT*timeFrac;
  const p=1/(1+Math.exp(-liveLogOdds));
  return Math.min(0.97,Math.max(0.03,p));
}
function effectiveProb(ri,mi,a,b){
  const sc=SCORES[ROUNDS[ri].key][mi];
  const prior=basePrior(ri,mi,a,b);
  if(sc && sc.state==="in" && sc.a!=null && sc.b!=null) return liveWinProb(prior,sc);
  return prior;
}
function anyMatchLive(){
  return ROUNDS.some(r=>SCORES[r.key].some(sc=>sc&&sc.state==="in"));
}
function scoreVsOutcome(pl,outcome){
  let s=0;ROUNDS.forEach(r=>{for(let m=0;m<r.m;m++){if(PLAYERS[pl][r.key][m]===outcome[r.key][m])s+=r.pts;}});return s;
}
// "Best path": for each player, which still-open results matter most for them winning the pool —
// found by comparing, per open slot, P(team wins slot | player wins pool) against the unconditional
// baseline P(team wins slot). Slots where that gap is largest are the load-bearing ones to watch.
function describePathSlot(pl,ri,mi,team){
  const roundName=ROUNDS[ri].name, theirPick=pickAt(pl,ri,mi);
  if(team===theirPick) return `${team} wins the ${roundName}`;
  const [a,b]=actualFeeders(ri,mi);
  if(a&&b&&(theirPick===a||theirPick===b)) return `${theirPick===a?b:a} beats ${theirPick} (${roundName})`;
  // Real feeders for this slot aren't locked in yet, so actualFeeders can't confirm theirPick even
  // gets here — but if theirPick is also this player's own pick for one of the two rounds feeding
  // this slot, their own bracket already assumes they arrive. Reporting "doesn't make it" would then
  // contradict whatever this same player's best-path entry for that earlier round says (e.g. "wins
  // the Quarterfinals" right next to "doesn't make the Semifinals"). The honest story there is a
  // loss at THIS round, not a failure to arrive.
  if(ri>0 && [pickAt(pl,ri-1,mi*2),pickAt(pl,ri-1,mi*2+1)].includes(theirPick)){
    return `${team||"their opponent"} beats ${theirPick} (${roundName})`;
  }
  return `${theirPick} doesn't make the ${roundName}`;
}
// Best-path story per player from a winStats result: for each open slot, compare
// P(team fills slot | player wins pool) against the unconditional P(team fills slot); the biggest
// gaps are the results that matter most to that player. Exact tallies when winStats enumerated.
function buildBestPath(st){
  const bestPath={};
  st.names.forEach(pl=>{
    const denom=st.winProb[pl];
    const rows=st.open.map(s=>{
      const id=st.slotId(s), teamTally=st.pathTally[pl][id];
      let team=null, w=0;
      for(const t in teamTally){ if(teamTally[t]>w){ w=teamTally[t]; team=t; } }
      if(!team||denom<=0) return null;
      const condProb=w/denom, baseProb=st.baseTally[id][team]||0;
      return {ri:s.ri, mi:s.mi, team, delta:condProb-baseProb, condProb};
    }).filter(Boolean);
    // a team required at the Final was necessarily also required at every round it passed through
    // to get there — keep only the deepest (latest-round) mention of each team, or the story repeats itself
    const deepestByTeam={};
    rows.forEach(r=>{ const cur=deepestByTeam[r.team]; if(!cur||r.ri>cur.ri) deepestByTeam[r.team]=r; });
    const deduped=Object.values(deepestByTeam);
    deduped.sort((a,b)=>b.delta-a.delta);
    bestPath[pl]=deduped.slice(0,3).map(r=>describePathSlot(pl,r.ri,r.mi,r.team));
  });
  return bestPath;
}
function monteCarlo(N){
  const st=winStats(RESULTS, effectiveProb, {trackPath:true, N});
  const rows=st.names.map(pl=>({pl, winPct:100*st.winProb[pl], avg:st.avgScore[pl]}))
    .sort((a,b)=>b.winPct-a.winPct);
  return {rows, bestPath:buildBestPath(st), exact:st.exact, outcomes:st.outcomes};
}

let forecastCache=null;
function renderForecast(force){
  const el=document.getElementById("forecast");
  el.innerHTML=`<p class="fc-intro">Crunching the forecast…</p>`;
  // defer so the "running" message paints
  setTimeout(()=>{
    if(force||!forecastCache) forecastCache=monteCarlo(20000);
    const {rows:res, bestPath, exact, outcomes}=forecastCache;
    const maxW=Math.max(...res.map(r=>r.winPct),1);
    const played=matchesScored();
    const openSlots=[];
    ROUNDS.forEach(r=>{ for(let mi=0;mi<r.m;mi++){ if(RESULTS[r.key][mi]===null) openSlots.push({key:r.key,mi}); } });
    const withMarket=openSlots.filter(s=>ODDS[s.key][s.mi]!=null).length;
    const modeLabel=FORECAST_MODE==="market"?"Market-weighted":"Elo-weighted";
    const methodLabel=exact
      ? `exact · all ${outcomes.toLocaleString()} possible outcomes`
      : `${Math.round(outcomes/1000)}k Monte Carlo sims`;
    let h=`<div class="fc-head">
        <div>
          <div class="fc-title">Championship odds</div>
          <div class="fc-sub">${played===0?"Pre-tournament forecast":`Updated for ${played} played result${played>1?"s":""}`} · ${methodLabel} · ${modeLabel}</div>
        </div>
        <div class="fc-headright">
          <div class="fc-modes">
            <button class="fc-mode${FORECAST_MODE==="elo"?" on":""}" id="fcModeElo">Elo</button>
            <button class="fc-mode${FORECAST_MODE==="market"?" on":""}" id="fcModeMarket">Market</button>
          </div>
          <button class="sbtn" id="rerunFc">Re-run</button>
        </div>
      </div>
      <div class="fc-board">`;
    res.forEach((r,i)=>{
      const champ=PLAYERS[r.pl].r2[0];
      const alive=championAlive(r.pl);
      const w=(r.winPct/maxW*100);
      const path=(bestPath[r.pl]||[]);
      const pathTxt=path.length?`Best path: ${path.join(" · ")}`:"";
      h+=`<div class="fc-row">
        <div class="fc-rank">${i+1}</div>
        <div class="fc-who">
          <div class="fc-nm" data-pl="${r.pl}">${r.pl}</div>
          <div class="fc-champ">${FLAG[champ]} ${champ}${alive?"":' <span class="fc-out">eliminated</span>'}</div>
        </div>
        <div class="fc-barwrap"><div class="fc-bar" style="width:${w}%"></div></div>
        <div class="fc-pct">${r.winPct.toFixed(1)}<span>%</span></div>
        <div class="fc-avg">avg ${r.avg.toFixed(0)}</div>
        ${pathTxt?`<div class="fc-path">${pathTxt}</div>`:""}
      </div>`;
    });
    const liveNote=anyMatchLive()
      ? ` A match is live right now — its sim odds are nudged from the prior toward the current scoreline as the clock runs down (a heuristic, not a calibrated live-win model), so the forecast reflects what's actually happening on the pitch.`
      : "";
    const modeNote=FORECAST_MODE==="market"
      ? ` Using de-vigged DraftKings lines for ${withMarket} of ${openSlots.length} open match${openSlots.length===1?"":"es"} with a posted market; ${openSlots.length-withMarket} deeper/hypothetical slot${(openSlots.length-withMarket)===1?"":"s"} without a line yet fall back to Elo.`
      : ` Elo ratings put Argentina, Spain and France within ~10 points at the top — treat the favorite as a genuine toss-up, not a lock.`;
    const methodNote=exact
      ? ` With only ${outcomes.toLocaleString()} ways the rest of the bracket can play out, this is the exact answer — every outcome weighted by its probability, no sampling — so Re-run won't budge it.`
      : "";
    h+=`</div>
      <div class="fc-note">Win% = probability that player finishes first (ties split). Driven mostly by the champion pick, since the brackets are highly similar.${methodNote}${modeNote}${liveNote}</div>`;
    el.innerHTML=h;
    el.querySelector("#rerunFc").onclick=()=>renderForecast(true);
    el.querySelector("#fcModeElo").onclick=()=>{ if(FORECAST_MODE!=="elo"){ setForecastMode("elo"); renderForecast(true); } };
    el.querySelector("#fcModeMarket").onclick=()=>{ if(FORECAST_MODE!=="market"){ setForecastMode("market"); renderForecast(true); } };
    el.querySelectorAll(".fc-nm[data-pl]").forEach(node=>{
      node.onclick=()=>{ renderPlayerBracket(node.dataset.pl); showView("playerbracket"); };
    });
  },30);
}

/* ============ TABS ============ */
function flash(sel,msg){
  const b=document.querySelector(sel); if(!b)return;
  const orig=b.textContent; b.textContent=msg;
  setTimeout(()=>{b.textContent=orig;},1400);
}
const VIEWS=["standings","forecast","admin","playerbracket","moneymatch","whatif","timeline"];
function showView(v){
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on", x.dataset.view===v));
  VIEWS.forEach(id=>{ document.getElementById(id).style.display=(id===v)?"":"none"; });
  if(v==="forecast") renderForecast(false);
  if(v==="moneymatch") renderMoneyMatch();
  if(v==="whatif") renderWhatIf();
  if(v==="timeline") renderTimeline();
}
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>showView(t.dataset.view);
});

/* ============ THEME TOGGLE ============ */
const THEME_KEY="theme_pref";
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById("themeToggle").textContent = t==="light" ? "☾" : "☀︎";
}
function initTheme(){
  let saved=null;
  try{ saved=localStorage.getItem(THEME_KEY); }catch(e){}
  const theme = saved || (window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
  applyTheme(theme);
}
document.getElementById("themeToggle").onclick=()=>{
  const next = document.documentElement.dataset.theme==="light" ? "dark" : "light";
  applyTheme(next);
  try{ localStorage.setItem(THEME_KEY, next); }catch(e){}
};
initTheme();

renderStandings();
renderAdmin();
pollEspn();
setInterval(pollEspn, 120000);
</script>
